<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="/build/assets/app-CZm7A6Fx.css"></head>
<body class="bg-white p-6">
<div class="max-w-6xl mx-auto">
  <div id="addbar" class="w-full mb-3 rounded-lg border border-gray-200 px-4 py-2.5 text-sm text-gray-400">Add a task and press Enter…</div>
  <div class="overflow-x-auto">
    <table id="tbl" class="w-full min-w-[720px] text-sm border border-gray-200 rounded-lg overflow-hidden">
      <thead><tr class="bg-gray-100 text-xs uppercase tracking-wide text-gray-400">
        <th class="w-9"></th><th class="text-left px-3 py-2">Task</th><th class="w-44 text-left px-3 py-2">Assignee</th>
        <th class="w-16 text-center px-3 py-2">Pri</th><th class="w-40 text-left px-3 py-2">%</th>
        <th class="w-32 text-left px-3 py-2">Completed</th><th class="w-8"></th><th class="w-10"></th></tr></thead>
      <tbody><tr class="border-t"><td class="px-3 py-2"><input type="checkbox"></td>
        <td class="px-3 py-2">Nr throughput with Alexander</td><td class="px-3 py-2 text-gray-400">Unassigned</td>
        <td class="px-3 py-2 text-center">High</td><td class="px-3 py-2">bar</td><td class="px-3 py-2">0%</td><td></td><td></td></tr></tbody>
    </table>
  </div>
</div>
<script>
window.addEventListener('load',()=>{
  var a=document.getElementById('addbar').getBoundingClientRect();
  var t=document.getElementById('tbl').getBoundingClientRect();
  var w=document.querySelector('.overflow-x-auto').getBoundingClientRect();
  document.title = 'addbar='+Math.round(a.width)+' wrap='+Math.round(w.width)+' table='+Math.round(t.width);
});
</script>
</body></html>
