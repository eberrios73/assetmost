<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="/build/assets/app-CZm7A6Fx.css"></head>
<body class="bg-white p-6"><div class="max-w-6xl mx-auto">
<input id="addbar" class="w-full mb-3 rounded-lg border-gray-200 text-sm" placeholder="Add a task…">
<div class="overflow-x-auto">
<table id="tbl" class="w-full min-w-[720px] text-sm border border-gray-200 rounded-lg overflow-hidden">
<thead><tr class="bg-gray-100 text-xs uppercase text-gray-400">
<th class="text-left font-normal px-3 py-2 w-9"></th><th class="text-left font-normal px-3 py-2">Task</th>
<th class="text-left font-normal px-3 py-2 w-44">Assignee</th><th class="text-left font-normal px-3 py-2 w-16 text-center">Pri</th>
<th class="text-left font-normal px-3 py-2 w-40">%</th><th class="text-left font-normal px-3 py-2 w-32">Completed</th>
<th class="text-left font-normal px-3 py-2 w-8"></th><th class="text-left font-normal px-3 py-2 w-10"></th></tr></thead>
<tbody>
<tr class="bg-gray-100 border-y"><td colspan="8" class="px-3 py-1.5 text-xs">CURRENT<span class="float-right text-blue-600">26% complete</span></td></tr>
<!-- THIS row mimics the real one: relative + before:absolute priority bar -->
<tr class="group border-b border-gray-100 relative before:absolute before:left-0 before:top-0 before:h-full before:w-[3px] before:bg-red-500">
<td class="px-3 py-1.5 text-center"><input type="checkbox"></td><td class="px-3 py-1.5">RenderNodes Windows 11</td>
<td class="px-3 py-1.5 text-gray-400">Unassigned</td><td class="px-3 py-1.5 text-center">High</td>
<td class="px-3 py-1.5"><input type="range" class="w-24"> 50%</td><td class="px-3 py-1.5"></td>
<td class="px-1 py-1.5 text-center">&#9656;</td><td class="px-3 py-1.5 text-center">x</td></tr>
</tbody></table></div></div>
<script>window.addEventListener("load",()=>{
var t=tbl,h=t.tHead.rows[0],b=t.tBodies[0].rows;
document.title="HEADends="+Math.round(h.cells[h.cells.length-1].getBoundingClientRect().right)
 +" DATAends="+Math.round(b[1].cells[b[1].cells.length-1].getBoundingClientRect().right)
 +" TABLEends="+Math.round(t.getBoundingClientRect().right);
});</script></body></html>
